name: Trivy Scanner - Container Images

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  build-matrix:
    # TODO: Uncomment before merging to main
    # if: ${{ github.repository == 'awslabs/mountpoint-s3-csi-driver' }}
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build image matrix
        id: set-matrix
        run: |
          IMAGES=$(yq '[
            (.image.repository + ":" + .image.tag),
            (.sidecars.nodeDriverRegistrar.image.repository + ":" + .sidecars.nodeDriverRegistrar.image.tag),
            (.sidecars.livenessProbe.image.repository + ":" + .sidecars.livenessProbe.image.tag),
            .experimental.headroomPodImage
          ] | . style="flow"' charts/aws-mountpoint-s3-csi-driver/values.yaml)
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

  trivy-scan:
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.build-matrix.outputs.images) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Trivy
        run: make install-trivy

      - name: Pull container image
        run: docker pull ${{ matrix.image }}

      - name: Scan container image
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
        run: |
          ./tools/bin/trivy image \
            --ignore-unfixed \
            --format sarif \
            --output results.sarif \
            --severity HIGH,CRITICAL \
            '${{ matrix.image }}'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'results.sarif'
